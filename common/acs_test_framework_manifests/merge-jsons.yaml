                      sub_test_description: Bring interface up
                      sub_test_result: PASSED
                  test_suite_summary:
                    total_passed: 1
                    total_failed: 0
                    total_failed_with_waiver: 0
                    total_aborted: 0
                    total_skipped: 0
                    total_warnings: 0
              suite_summary:
                total_passed: 1
                total_failed: 0
                total_failed_with_waiver: 0
                total_aborted: 0
                total_skipped: 0
                total_warnings: 0
        post_checks:
