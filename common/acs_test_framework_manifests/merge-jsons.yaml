      # In DT mode, missing recommended BSA is still reported explicitly as
      # not run and contributes to the overall not-compliant result.
      - name: dt_missing_recommended_bsa_is_reported_not_run
        type: module_main_with_env
        scenario:
          kind: merge_jsons
          dt_or_sr_mode: DT
          yocto_flag_path: yocto.flag
          input_files:
            acs_info.json:
              ACS Results Summary:
