        post_checks:
          - type: file_contains
            path: "{dir}/merged.json"
            text: "Suite_Name: Conditional-Mandatory  : PFDI_compliance"

      # Dictionary-form subtest result counters are currently treated as real
      # failures when a FAILED bucket is present, even alongside waiver counts.
      - name: dict_subtest_result_map_is_counted_using_failed_bucket
        warn_only: true
        scenario:
          kind: merge_jsons
          input_files:
            fwts.json:
              test_results:
                - Test_suite: uefivar
                  Test_suite_description: FWTS UEFI variable service checks
