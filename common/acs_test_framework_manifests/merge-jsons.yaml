      # PFDI is conditional-mandatory in DT mode and should be labeled that way
      # when a real pfdi.json result is present.
      - name: dt_pfdi_conditional_mandatory_path_is_reported_correctly
        type: module_main_with_env
        scenario:
          kind: merge_jsons
          dt_or_sr_mode: DT
          yocto_flag_path: yocto.flag
          input_files:
            acs_info.json:
              ACS Results Summary:
                Overall Compliance Result: Unknown
            pfdi.json:
              - Test_suite: PFDI
                subtests:
                  - sub_Test_Number: "1"
                    sub_Test_Description: Firmware fault interface probe
                    sub_test_result: FAILED
                    reason: Fault detection interface returned failure
                test_suite_summary:
                  total_passed: 0
                  total_failed: 1
                  total_aborted: 0
                  total_skipped: 0
                  total_warnings: 0
              - Suite_summary:
                  total_passed: 0
                  total_failed: 1
                  total_aborted: 0
                  total_skipped: 0
                  total_warnings: 0
          output_file: merged.json
        expect_exit_code: 0
        expect_stdout_or_stderr_contains:
