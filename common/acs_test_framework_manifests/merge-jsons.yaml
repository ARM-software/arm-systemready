                      sub_test_result:
                        FAILED: 1
                        FAILED_WITH_WAIVER: 2
                  test_suite_summary:
                    total_passed: 0
                    total_failed: 1
                    total_failed_with_waiver: 2
                    total_aborted: 0
                    total_skipped: 0
                    total_warnings: 0
              suite_summary:
                total_passed: 0
                total_failed: 1
                total_failed_with_waiver: 2
                total_aborted: 0
                total_skipped: 0
                total_warnings: 0
        expect_stdout_or_stderr_contains:
          - "Suite: Mandatory  : FWTS: Not Compliant: Failed 1"
