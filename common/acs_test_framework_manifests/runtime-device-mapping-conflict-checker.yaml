            RT_Code 0x3000-0x30ff 1 0
        expect_output:
          - "Total DTS ranges checked: 1"
          - "RESULTS: FAILED"

      # Native fault-injection cases stay declarative through scenario flags.

      - name: cli_missing_dts_file_is_warned_natively
        type: module_main_with_env
        warn_only: true
        scenario:
          kind: runtime_device_mapping
          missing_dts: true
          memmap: |
            RT_Code 0x1000-0x1fff 1 0
        post_checks:
          - type: exists
            path: "{dir}/runtime_device_mapping_conflict_test.log"
          - type: file_contains
            path: "{dir}/runtime_device_mapping_conflict_test.log"
            text: "DEBUG: DTS file not found:"
          - type: file_contains
            path: "{dir}/runtime_device_mapping_conflict_test.log"
            text: "RESULTS: WARNINGS"

      - name: cli_missing_memmap_file_is_warned_natively
