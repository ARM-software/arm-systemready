          kind: runtime_device_mapping
          dts: |
            /dts-v1/;
            / {
              soc {
                #address-cells = <2>;
                #size-cells = <2>;
                ranges;
                uart@3000 {
                  reg = <0x0 0x3000 0x0 0x100>;
                };
              };
            };
        expect_output:
          - "DEBUG: Memmap file not found"
          - "RESULTS: WARNINGS"
        post_checks:
