# Safe scenario-based runtime-device-mapping YAML.
#
# Requires mock_loader support for:
#
# scenario:
#   kind: runtime_device_mapping
#   dts: |
#     ...
#   memmap: |
#     ...
#   memmap_hex: "..."
#
# The mock_loader should materialize:
#   dts       -> text_files.device_tree.dts
#   memmap    -> text_files.memmap.log
#   memmap_hex -> bin_files.memmap.log.hex
#
# IMPORTANT:
# The main scenario corpus still uses the proven CLI case_runner.py path.
# Native fault-injection cases may use in-process handlers when that is the
# cleaner seam.

x_case_runner: &case_runner |
  #!/usr/bin/env python3
  from __future__ import annotations

  import importlib.util
  import sys
  from pathlib import Path

  def main() -> int:
      if len(sys.argv) != 2:
          print("usage: case_runner.py <target_script>", file=sys.stderr)
          return 2

      work_dir = Path.cwd()
      target = Path(sys.argv[1]).resolve()

      spec = importlib.util.spec_from_file_location(
          "runtime_checker_under_test",
          target,
      )
      if spec is None or spec.loader is None:
          print(f"failed to load target: {{target}}", file=sys.stderr)
          return 2

      module = importlib.util.module_from_spec(spec)
      sys.modules[spec.name] = module
      spec.loader.exec_module(module)

      module.DTS_PATH = work_dir / "device_tree.dts"
      module.MEMMAP_PATH = work_dir / "memmap.log"
      module.OUT_LOG_PATH = work_dir / "runtime_device_mapping_conflict_test.log"
      module._LOG_FH = None

      try:
          module.main()
      except SystemExit as exc:
          code = exc.code
          if isinstance(code, int):
              return code
          return 1

      log_path = work_dir / "runtime_device_mapping_conflict_test.log"
      if log_path.exists():
          print(log_path.read_text(encoding="utf-8", errors="replace"), end="")

      return 0

  if __name__ == "__main__":
      raise SystemExit(main())

x_cli_case_base: &cli_case_base
  type: cli
  command: "{dir}/case_runner.py"
  args:
    - "{file}"
  expect_exit_code: 0
  scripts:
    case_runner.py: *case_runner

suites:
  - name: runtime_device_mapping_conflict_checker
    files:
      - common/linux_scripts/runtime_device_mapping_conflict_checker.py

    cases:
      - name: file_exists
        type: file_exists
        description: "Verify that the runtime device mapping conflict checker script exists."

      - name: python_compiles
        type: py_compile
        description: "Ensure that the script compiles successfully as valid Python."

      - name: has_main_guard
        type: main_guard
        description: "Check that the script contains a standard __main__ guard."

      - name: cli_missing_both_inputs_warns
        <<: *cli_case_base
        scenario:
          kind: runtime_device_mapping
        expect_output:
          - "DEBUG: DTS file not found"
          - "RESULTS: WARNINGS"
        post_checks:
          - type: exists
            path: "{dir}/runtime_device_mapping_conflict_test.log"

      - name: cli_missing_memmap_warns
