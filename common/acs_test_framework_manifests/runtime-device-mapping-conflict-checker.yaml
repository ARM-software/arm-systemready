          memmap: |
            RT_Code 0x1000-0x1fff 1 0
            RT_Data 0x5000-0x5fff 1 0
        expect_output:
          - "All UEFI Memmap segments CHECKED"
          - "All DTS MMIO ranges CHECKED"
          - "Total segments checked: 2"
          - "Total DTS ranges checked: 1"
          - "No overlaps found between UEFI runtime regions and DTS MMIO ranges"
          - "RESULTS: PASSED"
        post_checks:
