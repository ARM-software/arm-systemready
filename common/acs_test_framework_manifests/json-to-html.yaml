        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

      # Summary should be tallied from testcase-level results when that is the source of truth.
      - name: scmi_summary_is_tallied_from_testcase_results
        warn_only: true
        scripts:
          scmi.json: |
            {
              "test_results": [
                {
                  "Test_suite": "SCMI",
                  "reason": "Suite reason",
                  "testcases": [
                    {
                      "Test_case": "Case 1",
                      "Test_case_description": "One passed testcase",
                      "Test_result": "PASSED",
                      "reason": "ok"
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/scmi.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "SCMI"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Case 1"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "PASSED"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="pass">1</td>'

  - name: standalone_tests_json_to_html_specific

    # Standalone-tests specific validation.
    files:
      - common/log_parser/standalone_tests/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Malformed JSON must fail loudly.
      - name: standalone_invalid_json_input
        scripts:
          standalone.json: |
            { invalid json
        args:
          - "{dir}/standalone.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|usage|json)"

      # Unknown subtest result shape should still render in detail,
      # while summary currently counts the testcase as passed.
      - name: unknown_subtest_status_appears_in_detail_but_summary_counts_test_as_passed
        warn_only: true
        scripts:
          standalone.json: |
            {
              "test_results": [
                {
                  "Test_suite": "Standalone",
                  "Test_suite_description": "Unknown status handling",
                  "Test_case": "Case 1",
                  "Test_case_description": "Unsupported status shape",
                  "subtests": [
                    {
                      "sub_Test_Number": "1",
                      "sub_Test_Description": "Status is empty dict",
                      "sub_test_result": {}
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/standalone.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Standalone"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Case 1"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "UNKNOWN"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="pass">1</td>'

      # WARNING should take priority over FAILED_WITH_WAIVER in summary classification.
      - name: warning_status_takes_priority_over_failed_with_waiver
        warn_only: true
        scripts:
          standalone.json: |
            {
              "test_results": [
                {
                  "Test_suite": "Standalone",
                  "Test_suite_description": "Priority handling",
                  "Test_case": "Case 1",
                  "Test_case_description": "Warnings and waiver together",
                  "subtests": [
                    {
                      "sub_Test_Number": "1",
                      "sub_Test_Description": "Warning subtest",
                      "sub_test_result": {
                        "WARNINGS": 1,
                        "warning_reasons": ["warning path"]
                      }
                    },
                    {
                      "sub_Test_Number": "2",
                      "sub_Test_Description": "Waiver subtest",
                      "sub_test_result": {
                        "FAILED_WITH_WAIVER": 1,
                        "waiver_reason": "accepted waiver"
                      }
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/standalone.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Warning subtest"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Waiver subtest"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "FAILED WITH WAIVER"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "accepted waiver"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="warning">1</td>'
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="waiver">0</td>'

      # Nested reason lists should be flattened into a single rendered reason column.
      - name: nested_reason_lists_are_flattened_into_single_reason_column
        warn_only: true
        scripts:
          standalone.json: |
            {
              "test_results": [
                {
                  "Test_suite": "Standalone",
                  "Test_suite_description": "Reason flattening",
                  "Test_case": "Case 1",
                  "Test_case_description": "Nested reasons",
                  "subtests": [
                    {
                      "sub_Test_Number": "1",
                      "sub_Test_Description": "Nested fail reasons",
                      "sub_test_result": {
                        "FAILED": 1,
                        "fail_reasons": [["reason A", "reason B"], ["reason C"]]
                      }
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/standalone.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Nested fail reasons"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "FAILED"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "reason A"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "reason B"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "reason C"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
