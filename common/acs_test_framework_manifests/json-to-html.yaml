  - name: bsa_json_to_html_specific

    # BSA-specific validation.
    files:
      - common/log_parser/bsa/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Malformed JSON must fail loudly.
      - name: bsa_invalid_json_input
        scripts:
          bsa.json: |
            { invalid json
        args:
          - "{dir}/bsa.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

      # Confirms that the summary page trusts the top-level suite_summary,
      # even if a detailed testcase row would imply a different result.
      - name: bsa_top_level_summary_is_used_even_if_detailed_results_differ
        warn_only: true
        scripts:
          bsa.json: |
            {
              "suite_summary": {
                "Passed": 5,
                "Failed": 0,
                "Total_failed_with_waiver": 0,
                "Aborted": 0,
                "Skipped": 0,
                "Warnings": 0,
                "Not Implemented": 0,
                "PAL Not Supported": 0,
                "Passed (Partial)": 0,
                "Total Rules Run": 5
              },
              "test_results": [
                {
                  "Test_suite": "BSA",
                  "testcases": [
                    {
                      "Test_case": "Rule 1",
                      "Test_case_description": "Detailed row says failed",
                      "Test_result": "FAILED"
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/bsa.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "BSA"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Rule 1"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "FAILED"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="pass">5</td>'
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="fail">0</td>'

  - name: os_tests_json_to_html_specific

    # OS tests specific validation.
    files:
      - common/log_parser/os_tests/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Malformed JSON must fail loudly.
      - name: os_tests_invalid_json_input
        scripts:
          os_test.json: |
            { invalid json
        args:
          - "{dir}/os_test.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|usage|json)"

      # Verifies the handling of an unsupported sub_test_result shape.
      # Outside SR-single mode, the summary should count it as failed.
      - name: os_tests_unknown_subtest_is_treated_as_failed_outside_sr_single_mode
        warn_only: true
        scripts:
          os_custom.json: |
            {
              "os_name": "DemoOS",
              "test_results": [
                {
                  "Test_suite_name": "OS Tests",
                  "Test_suite_description": "Unknown status handling",
                  "Test_case": "Case 1",
                  "Test_case_description": "Unknown subtest result",
                  "subtests": [
                    {
                      "sub_Test_Number": "1",
                      "sub_Test_Description": "Unknown result object",
                      "sub_test_result": {}
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/os_custom.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Case 1"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "INFO"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="fail">1</td>'

  - name: pfdi_json_to_html_specific

    # PFDI-specific validation.
    files:
      - common/log_parser/pfdi/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Malformed JSON must fail loudly.
      - name: pfdi_invalid_json_input
        scripts:
          pfdi.json: |
            { invalid json
        args:
          - "{dir}/pfdi.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

      # Nested waiver_reason should be promoted and displayed at subtest level.
      - name: pfdi_nested_waiver_reason_is_promoted_to_subtest
        warn_only: true
        scripts:
          pfdi.json: |
            [
              {
                "Test_suite": "PFDI",
                "subtests": [
                  {
                    "sub_Test_Number": "1",
                    "sub_Test_Description": "Nested waiver reason",
                    "sub_test_result": {
                      "waiver_reason": "nested waiver detail"
                    }
                  }
                ],
                "test_suite_summary": {
                  "total_passed": 1,
                  "total_failed": 0,
                  "total_failed_with_waiver": 0,
                  "total_aborted": 0,
                  "total_skipped": 0,
                  "total_warnings": 0
                }
              },
              {
                "Suite_summary": "overall"
              }
            ]
        args:
          - "{dir}/pfdi.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "PFDI"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Nested waiver reason"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "nested waiver detail"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="pass">1</td>'

  - name: post_script_json_to_html_specific

    # Post-script specific validation.
    files:
      - common/log_parser/post_script/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Malformed JSON must fail loudly.
      - name: post_script_invalid_json_input
        scripts:
          post.json: |
            { invalid json
        args:
          - "{dir}/post.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

      # FAILED_WITH_WAIVER should be rendered distinctly in both detail and summary output.
      - name: post_script_failed_with_waiver_is_rendered_separately
        warn_only: true
        scripts:
          post.json: |
            {
              "suite_summary": {
                "total_passed": 0,
                "total_failed": 0,
                "total_failed_with_waiver": 1,
                "total_aborted": 0,
                "total_skipped": 0,
                "total_warnings": 0
              },
              "test_results": [
                {
                  "Test_suite": "Post Script",
                  "Test_suite_description": "Waiver handling",
                  "subtests": [
                    {
                      "sub_Test_Number": "1",
                      "sub_Test_Description": "Waived failure",
                      "sub_test_result": {
                        "FAILED_WITH_WAIVER": 1,
                        "waiver_reason": "approved"
                      }
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/post.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Post Script"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Waived failure"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "FAILED WITH WAIVER"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "approved"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Result Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="fail-waiver">1</td>'

  - name: sbmr_json_to_html_specific

    # SBMR-specific validation.
    files:
      - common/log_parser/sbmr/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Malformed JSON must fail loudly.
      - name: sbmr_invalid_json_input
        scripts:
          sbmr.json: |
            { invalid json
        args:
          - "{dir}/sbmr.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

      # Same malformed-input check, but with an extra report path argument.
      - name: sbmr_invalid_json_input_with_report_path
        scripts:
          sbmr.json: |
            { invalid json
          report.html: |
            <html><body>report</body></html>
        args:
          - "{dir}/sbmr.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
          - "{dir}/report.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

      # When top-level summary is missing, the implementation should recompute it from testcase data.
      - name: sbmr_recomputes_summary_when_top_level_summary_missing
        warn_only: true
        scripts:
          sbmr.json: |
            {
              "test_results": [
                {
                  "Test_suite": "SBMR IB",
                  "test_suite_summary": {
                    "total_passed": 1,
                    "total_failed": 0,
                    "total_failed_with_waiver": 0,
                    "total_aborted": 0,
                    "total_skipped": 0,
                    "total_warnings": 0
                  },
                  "subtests": [
                    {
                      "sub_Test_Number": "1",
                      "sub_Test_Description": "Passed case",
                      "sub_test_result": "PASSED"
                    }
                  ]
                }
              ]
            }
        args:
          - "{dir}/sbmr.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code: 0
        post_checks:
          - type: exists
            path: "{dir}/detail.html"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "SBMR IB"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "Passed case"
          - type: file_contains
            path: "{dir}/detail.html"
            text: "PASSED"
          - type: exists
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "Overall Summary"
          - type: file_contains
            path: "{dir}/summary.html"
            text: '<td class="pass">1</td>'

  - name: scmi_json_to_html_specific

    # SCMI-specific validation.
    files:
      - common/log_parser/scmi/json_to_html.py

    defaults:
