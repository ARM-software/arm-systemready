suites:
  - name: json_to_html_common

    # Run the common json_to_html sanity checks against every implementation.
    files:
      - common/log_parser/bbr/fwts/json_to_html.py
      - common/log_parser/bbr/sct/json_to_html.py
      - common/log_parser/bbr/tpm/json_to_html.py
      - common/log_parser/bsa/json_to_html.py
      - common/log_parser/os_tests/json_to_html.py
      - common/log_parser/pfdi/json_to_html.py
      - common/log_parser/post_script/json_to_html.py
      - common/log_parser/sbmr/json_to_html.py
      - common/log_parser/scmi/json_to_html.py
      - common/log_parser/standalone_tests/json_to_html.py

    # Shared defaults for the generic CLI-based json_to_html checks.
    defaults:
      type: cli
      env:
        MPLBACKEND: Agg

    cases:
      # Basic file-level checks.
      - name: file_exists
        type: file_exists

      - name: python_compiles
        type: py_compile

      - name: has_main_guard
        type: main_guard

      # Empty JSON should be handled gracefully.
      # Some implementations may exit 0, others 1, so keep this warning-only.
      - name: empty_json_input
        warn_only: true
        scripts:
          empty.json: |
            {}
        args:
          - "{dir}/empty.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [0, 1]
        expect_stdout_or_stderr_regex:
          - "(?i)(no valid data|error|missing|invalid|usage)"

      # Missing top-level test_results key should not crash the script.
      - name: missing_test_results_key
        warn_only: true
        scripts:
          missing_key.json: |
            {
              "random_field": []
            }
        args:
          - "{dir}/missing_key.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [0, 1]
        expect_stdout_or_stderr_regex:
          - "(?i)(no valid data|missing|error|usage)"

      # Test case exists but subtests field is missing.
      - name: missing_subtests_in_test_case
        warn_only: true
        scripts:
          missing_subtests.json: |
            {
              "test_results": [
                {
                  "Test_suite": "Test",
                  "Test_case": "Case without subtests"
                }
              ]
            }
        args:
          - "{dir}/missing_subtests.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [0, 1]
        expect_stdout_or_stderr_regex:
          - "(?i)(no valid data|error|missing|warning|^$)"

      # Minimal structurally valid input. Some implementations may still warn or exit early.
      - name: minimal_valid_structure_generates_or_exits_cleanly
        warn_only: true
        scripts:
          minimal.json: |
            {
              "test_results": [
                {
                  "Test_suite": "Minimal",
                  "Test_case": "Basic",
                  "subtests": []
                }
              ]
            }
        args:
          - "{dir}/minimal.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [0, 1]
        expect_stdout_or_stderr_regex:
          - "(?i)(no valid data|error|warning|^$)"

  - name: fwts_json_to_html_specific

    # FWTS-specific validation.
    files:
      - common/log_parser/bbr/fwts/json_to_html.py

    defaults:
      type: cli
      env:
        MPLBACKEND: Agg
      expect_exit_code_in: [1, 2]
      expect_stdout_or_stderr_regex:
        - "(?i)(error|exception|traceback|json)"

    cases:
      # Malformed JSON must fail loudly.
      - name: fwts_invalid_json_input
        scripts:
          fwts.json: |
            { invalid json
        args:
          - "{dir}/fwts.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"

