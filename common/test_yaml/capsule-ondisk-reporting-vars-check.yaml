            - name: Capsule0001
              attrs: 0x07
              payload_hex: "AA"
            - name: Capsule0002
              attrs: 0x06
              payload_hex: "BB"
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleNNNN Variable Test: Capsule0001 Variable Test: PASSED"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleNNNN Variable Test: Capsule0002 Variable Test: PASSED"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "actual attributes Value:0x6"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: WARNING"

      - name: all_valid_variables_return_0_and_pass
        type: module_main_with_env
        patch_constants:
          EFIVAR_PATH: "{dir}/efivars"
          LOG_FILE: "{dir}/capsule.log"
        dir_structure:
          - path: efivars
        bin_files:
          efivars/OsIndicationsSupported-8be4df61-93ca-11d2-aa0d-00e098032b8c:
            hex: "070000000400000000000000"
          efivars/CapsuleMax-39b68c46-f7fb-441b-b6ec-16b0f69821f3:
            hex: "06000000430061007000730075006c0065003000300030003100"
          efivars/CapsuleLast-39b68c46-f7fb-441b-b6ec-16b0f69821f3:
            hex: "07000000430061007000730075006c0065003000300030003100"
          efivars/Capsule0001-39b68c46-f7fb-441b-b6ec-16b0f69821f3:
            hex: "07000000AA"
        expect_exit_code: 0
        post_checks:
          - type: ordered_contains
            path: "{dir}/capsule.log"
            texts:
              - "Testing Capsule On-Disk Update Reporting Variables"
              - "CapsuleMax Variable Test: PASSED"
              - "CapsuleLast Variable Test: PASSED"
              - "CapsuleNNNN Variable Test: Capsule0001 Variable Test: PASSED"
              - "Overall Capsule On-Disk Update Reporting Variables Result: PASSED"

      - name: cli_mock_open_raises_oserror_for_existing_capsulelast
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            supported: true
            attrs: 0x07
          capsule_max:
            name: Capsule0001
            attrs: 0x06
          capsule_last:
            name: Capsule0001
            attrs: 0x07
          capsule_entries:
            - name: Capsule0001
              attrs: 0x07
              payload_hex: "AA"
        mocks:
          builtins.open:
            factory: mock_helpers.passthrough_router
            inject_original_as: real
            kwargs:
              rules:
                - label: capsulelast-read-failure
                  required: true
                  when:
                    args:
                      0:
                        contains: "CapsuleLast-39b68c46-f7fb-441b-b6ec-16b0f69821f3"
                      1:
                        contains: "rb"
                  raise:
                    type: py:builtins.OSError
                    args: ["mocked read failure"]
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleLast Variable - Not Found or Not Accessible"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: WARNING"

      - name: cli_mock_listdir_failure_for_existing_efivarfs
