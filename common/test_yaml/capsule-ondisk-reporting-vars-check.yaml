          capsule_max:
            hex: "0600000041004200"
          capsule_last:
            name: Capsule0001
            attrs: 0x07
          capsule_entries:
            - name: Capsule0001
              attrs: 0x07
              payload_hex: "AA"
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleMax Variable Test: WARNING"

      - name: missing_capsulelast_returns_3
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            supported: true
            attrs: 0x07
