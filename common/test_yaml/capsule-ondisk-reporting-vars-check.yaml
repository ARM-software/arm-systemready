          os_indications:
            supported: true
            attrs: 0x07
          capsule_max:
            name: Capsule0001
            attrs: 0x06
          capsule_last:
            hex: "07000000420061006400560061006c0075006500000000000000"
          capsule_entries:
            - name: Capsule0001
              attrs: 0x07
              payload_hex: "AA"
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleLast Variable Test: WARNING"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: WARNING"

      - name: capsulemax_too_short_returns_3
        type: module_main_with_env
