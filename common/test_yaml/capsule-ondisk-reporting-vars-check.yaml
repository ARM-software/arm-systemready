suites:
  - name: capsule_ondisk_reporting_vars_check
    files:
      - common/linux_scripts/capsule_ondisk_reporting_vars_check.py

    cases:
      - name: file_exists
        type: file_exists
        description: "Verify that the capsule on-disk reporting variables checker script exists."

      - name: python_compiles
        type: py_compile
        description: "Ensure that the script compiles successfully as valid Python."

      - name: has_main_guard
        type: main_guard
        description: "Check that the script contains a standard __main__ guard."

      - name: status_true_returns_passed
        type: py_function
        function: status
        args: [true]
        expect_return: "PASSED"

      - name: status_false_returns_warning
        type: py_function
        function: status
        args: [false]
        expect_return: "WARNING"

      - name: decode_valid_utf16le_returns_capsule_name
        type: py_function
        function: decode_char16_11_no_nul
        args:
          - !!binary |
            QwBhAHAAcwB1AGwAZQAwADAAMAAxAA==
        expect_return: "Capsule0001"

      - name: missing_efivarfs_returns_1_and_logs_warning
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          efivarfs_present: false
          efivar_dir: missing_efivars
          log_file: capsule.log
        expect_exit_code: 1
        post_checks:
          - type: exists
            path: "{dir}/capsule.log"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Please ensure efivarfs is enabled and mounted"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: WARNING"

      - name: missing_os_indications_returns_2_and_skips
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
        expect_exit_code: 2
        post_checks:
          - type: exists
            path: "{dir}/capsule.log"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "OsIndicationsSupported not found or unreadable"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: SKIPPED"

      - name: os_indications_without_capsule_support_bit_returns_2
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            value: 0
            attrs: 0x07
        expect_exit_code: 2
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "INFO: OsIndicationsSupported value: 0x0"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "INFO: Capsule on-disk reporting variables test is not applicable - SKIPPED"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: SKIPPED"

      - name: os_indications_short_data_treated_as_unreadable
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            hex: "070000000400"
        expect_exit_code: 2
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "OsIndicationsSupported not found or unreadable"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: SKIPPED"

      - name: support_claimed_but_missing_capsule_variables_returns_3
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            supported: true
            attrs: 0x07
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleMax Variable - Not Found or Not Accessible"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleLast Variable - Not Found or Not Accessible"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "No CapsuleNNNN reporting variables found - WARNING"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Overall Capsule On-Disk Update Reporting Variables Result: WARNING"

      - name: capsulemax_wrong_attributes_returns_3
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            supported: true
            attrs: 0x07
          capsule_max:
            name: Capsule0001
            attrs: 0x07
          capsule_last:
            name: Capsule0001
            attrs: 0x07
          capsule_entries:
            - name: Capsule0001
              attrs: 0x07
              payload_hex: "AA"
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleMax Variable Attribute Test"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "actual attributes Value:0x7"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Status - WARNING"

      - name: capsulelast_wrong_attributes_returns_3
        type: module_main_with_env
        scenario:
          kind: capsule_vars
          log_file: capsule.log
          os_indications:
            supported: true
            attrs: 0x07
          capsule_max:
            name: Capsule0001
            attrs: 0x06
          capsule_last:
            name: Capsule0001
            attrs: 0x06
          capsule_entries:
            - name: Capsule0001
              attrs: 0x07
              payload_hex: "AA"
        expect_exit_code: 3
        post_checks:
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "CapsuleLast Variable Attribute Test"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "actual attributes Value:0x6"
          - type: file_contains
            path: "{dir}/capsule.log"
            text: "Status - WARNING"

      - name: malformed_capsulelast_value_returns_3
        type: module_main_with_env
