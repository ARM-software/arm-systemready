            path: "{dir}/summary.html"
          - type: file_not_empty
            path: "{dir}/summary.html"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "BSA content"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "FWTS content"
          - type: file_contains
            path: "{dir}/summary.html"
            text: "SCMI content"
          - type: file_not_contains
            path: "{dir}/summary.html"
            text: "Result Summary"

