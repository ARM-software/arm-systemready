          - --merged_json
          - "{dir}/merged.json"
          - "{dir}/bsa.html"
          - "{dir}/sbsa.html"
          - "{dir}/fwts.html"
          - "{dir}/sct.html"
          - "{dir}/bbsr_fwts.html"
          - "{dir}/bbsr_sct.html"
          - "{dir}/bbsr_tpm.html"
          - "{dir}/pfdi.html"
          - "{dir}/post_script.html"
          - "{dir}/standalone.html"
          - "{dir}/os_tests.html"
          - "{dir}/capsule.html"
          - "{dir}/sbmr_ib.html"
          - "{dir}/sbmr_oob.html"
          - "{dir}/scmi.html"
          - "{dir}/summary.html"
