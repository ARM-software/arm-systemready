suites:
  - name: json_to_html_common
    files:
      - common/log_parser/bbr/fwts/json_to_html.py
      - common/log_parser/bbr/sct/json_to_html.py
      - common/log_parser/bbr/tpm/json_to_html.py
      - common/log_parser/bsa/json_to_html.py
      - common/log_parser/os_tests/json_to_html.py
      - common/log_parser/pfdi/json_to_html.py
      - common/log_parser/post_script/json_to_html.py
      - common/log_parser/sbmr/json_to_html.py
      - common/log_parser/scmi/json_to_html.py
      - common/log_parser/standalone_tests/json_to_html.py

    cases:
      - name: file_exists
        type: file_exists

      - name: python_compiles
        type: py_compile

      - name: contains_json_keyword
        type: source_contains
        pattern: "json"

      - name: contains_html_keyword
        type: source_contains_any
        patterns:
          - "html"
          - "HTML"

      - name: contains_html_generation_logic
        type: source_contains_any
        patterns:
          - "generate_html"
          - "generate_html_fwts"
          - "generate_html_improved"
          - "build_html"
          - "render_detail_html"
          - "render_summary_html"

      - name: contains_chart_or_summary_logic
        type: source_contains_any
        patterns:
          - "generate_bar_chart"
          - "generate_bar_chart_fwts"
          - "generate_bar_chart_improved"
          - "summary"
          - "chart"

      - name: contains_file_output_logic
        type: source_contains_any
        patterns:
          - "write("
          - "write_text("
          - "open("

      - name: has_main_guard
        type: main_guard

      - name: cli_invalid_json_input_fails
        type: cli
        env:
          MPLBACKEND: Agg
        scripts:
          bad.json: |
            { invalid json
        args:
          - "{dir}/bad.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|usage|json)"

  - name: fwts_json_to_html_specific
    files:
      - common/log_parser/bbr/fwts/json_to_html.py

    cases:
      - name: has_fwts_named_html_logic
        type: source_contains_any
        patterns:
          - "generate_html_fwts"
          - "FWTS"

      - name: has_fwts_chart_logic
        type: source_contains_any
        patterns:
          - "generate_bar_chart_fwts"
          - "fwts"

      - name: has_detect_columns_used
        type: function_exists
        function: "detect_columns_used"

      - name: cli_fwts_generates_html_outputs
        type: cli
        env:
          MPLBACKEND: Agg
        scripts:
          fwts.json: |
            { invalid json
        args:
          - "{dir}/fwts.json"
          - "{dir}/detail.html"
          - "{dir}/summary.html"
        expect_exit_code_in: [1, 2]
        expect_stdout_or_stderr_regex:
          - "(?i)(error|exception|traceback|json)"

