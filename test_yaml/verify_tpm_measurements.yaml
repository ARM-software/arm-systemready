                PCRIndex: 4
                EventType: EV_SEPARATOR
                Event: "sep4"

              - EventNum: 18
                PCRIndex: 5
                EventType: EV_SEPARATOR
                Event: "sep5"

              - EventNum: 19
                PCRIndex: 6
                EventType: EV_SEPARATOR
                Event: "sep6"

              - EventNum: 20
                PCRIndex: 7
                EventType: EV_SEPARATOR
                Event: "sep7"

              - EventNum: 21
                PCRIndex: 1
                EventType: EV_TABLE_OF_DEVICES
                Event: "SYS_CONFIG_UART0"

              - EventNum: 22
                PCRIndex: 5
                EventType: EV_EFI_ACTION
                Event: "Exit Boot Services Invocation"
            EOF

            python3 "$1" "$PWD/pcr.yaml" "$PWD/event.yaml"
        args:
          - "{file}"
        expect_exit_code: 0
        expect_stdout_or_stderr_contains:
          - "PCR[1] measurements does not match for sha256"
          - "FAIL"

      - name: cli_boot_variable_missing_reports_fail_but_runs
