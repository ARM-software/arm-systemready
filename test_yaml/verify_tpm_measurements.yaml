              - EventNum: 6
                PCRIndex: 7
                EventType: EV_EFI_VARIABLE_DRIVER_CONFIG
                Event:
                  UnicodeName: KEK

              - EventNum: 7
                PCRIndex: 7
                EventType: EV_EFI_VARIABLE_DRIVER_CONFIG
                Event:
                  UnicodeName: db

              - EventNum: 8
                PCRIndex: 7
                EventType: EV_EFI_VARIABLE_DRIVER_CONFIG
                Event:
                  UnicodeName: dbx

              - EventNum: 9
                PCRIndex: 1
                EventType: EV_EFI_VARIABLE_BOOT
                Event:
                  UnicodeName: BootOrder

              - EventNum: 10
                PCRIndex: 1
                EventType: EV_EFI_VARIABLE_BOOT2
                Event:
                  UnicodeName: Boot0001

              - EventNum: 11
                PCRIndex: 4
                EventType: EV_EFI_ACTION
                Event: "Calling EFI Application from Boot Option"

              - EventNum: 12
                PCRIndex: 1
                EventType: EV_EFI_HANDOFF_TABLES
                Event: "SMBIOS"

              - EventNum: 13
                PCRIndex: 0
