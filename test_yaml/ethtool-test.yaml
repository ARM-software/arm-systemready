                if "ping -c 3 -W 10 -I eth0 192.0.2.1" in cmd_s:
                    return R(0, "3 packets transmitted, 3 received, 0% packet loss\n", "")
                if "ping -c 3 -W 10 -I eth0 www.arm.com" in cmd_s:
                    return R(0, "3 packets transmitted, 3 received, 0% packet loss\n", "")
                if "curl -Is --connect-timeout 20 --interface eth0 https://www.arm.com" in cmd_s:
                    return R(0, "HTTP/2 200\n", "")
