                if "ip route show default" in cmd_s:
                    return R(0, "default via 192.0.2.1 dev eth0 proto dhcp\n", "")
                if "ip -o route show table all default" in cmd_s:
                    return R(0, "default via 192.0.2.1 dev eth0 proto dhcp\n", "")
