                        b"3: eth1: <BROADCAST,MULTICAST> mtu 1500 qdisc noop state DOWN mode DEFAULT group default qlen 1000 link/ether aa:bb:cc:dd:ee:02\n"
                    )
                return b""

            def fake_run(cmd, *args, **kwargs):
                cmd_s = norm(cmd)
