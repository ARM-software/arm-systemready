                if "ping -6 -c 3 -I eth1 ipv6.google.com" in cmd_s:
                    return R(0, "3 packets transmitted, 3 received, 0% packet loss\n", "")
                if "curl -Is --connect-timeout 20 --interface eth1 https://www.arm.com" in cmd_s:
                    return R(0, "HTTP/2 200\n", "")
