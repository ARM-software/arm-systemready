            import subprocess
            import sys
            import time
            from pathlib import Path

            target = sys.argv[1]
            cfg = sys.argv[2]

            class R:
                def __init__(self, returncode=0, stdout="", stderr=""):
                    self.returncode = returncode
                    self.stdout = stdout
                    self.stderr = stderr

