                if name in ("ethtool", "wget", "curl", "ping"):
                    return f"/usr/bin/{name}"
                return None

            def fake_resolve(self, *args, **kwargs):
                p = str(self)
                if p.endswith("/sys/class/net/eth0/device"):
                    return Path("/sys/devices/pci0000:00/0000:00:03.0/net/eth0")
                if p.endswith("/sys/class/net/eth1/device"):
                    return Path("/sys/devices/pci0000:00/0000:00:04.0/net/eth1")
                return self

            def fake_read_text(self, *args, **kwargs):
