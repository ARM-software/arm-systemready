                if "ip link show eth1" in cmd_s:
                    return R(0, "3: eth1: <BROADCAST,MULTICAST> mtu 1500 state DOWN\n", "")
                if "ip link set dev eth0 down" in cmd_s or "ip link set dev eth1 down" in cmd_s:
                    return R(0, "", "")
                if "ip link set dev eth0 up" in cmd_s or "ip link set dev eth1 up" in cmd_s:
                    return R(0, "", "")
                if cmd_s.strip() == "ethtool eth0":
                    return R(0, "Settings for eth0\n\tLink detected: yes\n", "")
                if cmd_s.strip() == "ethtool eth1":
                    return R(0, "Settings for eth1\n\tLink detected: no\n", "")
                if cmd_s.strip() == "ethtool -i eth0" or cmd_s.strip() == "ethtool -i eth1":
                    return R(0, "driver: fake\nsupports-test: no\n", "")
                if "ip address show dev eth0" in cmd_s:
                    return R(
